<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
        }

        .heart {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 48px;
            cursor: grab;
            user-select: none;
            transition: filter 0.1s;
            display: inline-block;
            transform-origin: center;
        }

        .heart:hover {
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.5));
        }

        .heart:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <div class="heart">❤️</div>

    <script>
        const heart = document.querySelector('.heart');
        let isDragging = false;
        let offsetX = 0;
        let offsetY = 0;
        let rotation = 0;

        heart.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = heart.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                heart.style.left = (e.clientX - offsetX) + 'px';
                heart.style.top = (e.clientY - offsetY) + 'px';
                heart.style.bottom = 'auto';
                updateTransform();
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Rotate with arrow keys or scroll wheel
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                rotation -= 5;
                updateTransform();
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                rotation += 5;
                updateTransform();
                e.preventDefault();
            }
        });

        heart.addEventListener('wheel', (e) => {
            e.preventDefault();
            rotation += (e.deltaY > 0 ? -5 : 5);
            updateTransform();
        }, { passive: false });

        function updateTransform() {
            heart.style.transform = `rotate(${rotation}deg)`;
        }
    </script>
</body>
</html>
