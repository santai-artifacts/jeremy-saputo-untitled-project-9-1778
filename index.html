<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
        }

        .heart {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 48px;
        }

        .heart-top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 48px;
        }
    </style>
</head>
<body>
    <div class="heart">❤️</div>
    <div class="heart-top-right">❤️</div>
</body>
</html>
